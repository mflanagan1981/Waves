# ODSL Top Times — automated weekly refresh
#
# Put this file in your repo at: .github/workflows/update_top_times.yml
# It needs the skill's build tooling committed in the repo under  tools/
#   tools/scripts/fetch_latest.py
#   tools/scripts/build_gadget.py
#   tools/assets/template.html
#   tools/assets/waves_logo.png
#   tools/references/cut_standards.csv
# (i.e. copy the whole skill folder into the repo and rename it "tools").
#
# Requirements:
#   - Repo is Public (or you have Pages on a paid plan).
#   - Pages is set to: Settings > Pages > Deploy from a branch > main / (root).
#   - Settings > Actions > General > Workflow permissions = "Read and write".
#
# When the 2026 All-Star standards are published: edit tools/references/cut_standards.csv
# with the new times, then change the build step below to add:
#     --standards-label 2026 --official

name: Update ODSL Top Times

on:
  workflow_dispatch:        # lets you run it on demand from the Actions tab
  schedule:
    # ODSL posts Monday & Friday mornings. 13:10 UTC ≈ 9:10am ET.
    # (If the file isn't up yet, the run simply no-ops thanks to change detection.)
    - cron: '10 13 * * 1,5'

permissions:
  contents: write

concurrency:
  group: update-top-times
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (for logo processing)
        run: pip install --quiet pillow numpy

      - name: Fetch newest Individual Rankings
        id: fetch
        run: python tools/scripts/fetch_latest.py --out data/odsl_top_times.csv --state .last_source_id

      - name: Build index.html
        if: steps.fetch.outputs.changed == 'true'
        run: python tools/scripts/build_gadget.py --csv "${{ steps.fetch.outputs.csv_path }}" --out index.html

      - name: Commit & push
        if: steps.fetch.outputs.changed == 'true'
        run: |
          git config user.name  "odsl-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html .last_source_id data/
          git commit -m "Update top times (source ${{ steps.fetch.outputs.source_id }})"
          git push
