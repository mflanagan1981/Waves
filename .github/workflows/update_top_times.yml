# ODSL Top Times — rebuild the league page when you upload a new CSV
#
# Goes at: .github/workflows/update_top_times.yml  (replace the old contents)
#
# Builds ONE page (the ODSL league version) and publishes it at BOTH:
#   index.html        -> https://mflanagan1981.github.io/Waves/
#   odsl/index.html   -> https://mflanagan1981.github.io/Waves/odsl/
# so every existing link keeps working and shows the same page.
#
# Teams embed with their own code + compact header, e.g.:
#   .../Waves/odsl/?team=WWNOR&compact=1
#
# Needs the build tooling in the repo under tools/ and
# Settings > Actions > General > Workflow permissions = "Read and write".
#
# 2026 All-Star standards are in tools/references/cut_standards.csv and the build below
# is set to label them "2026" and mark them official.

name: Build ODSL Top Times

on:
  workflow_dispatch:
  push:
    paths:
      - 'odsl_top_times_*.csv'
      - '**/odsl_top_times_*.csv'

permissions:
  contents: write

concurrency:
  group: build-top-times
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (for logo processing)
        run: pip install --quiet pillow numpy

      - name: Find the newest uploaded CSV
        id: pick
        run: |
          latest=$(
            for f in odsl_top_times_*.csv data/odsl_top_times_*.csv; do
              [ -e "$f" ] && printf '%s|%s\n' "$(basename "$f")" "$f"
            done | sort | tail -n1 | cut -d'|' -f2
          )
          if [ -z "$latest" ]; then
            echo "No odsl_top_times_*.csv found in the repo root or data/ folder."; exit 1
          fi
          echo "csv=$latest" >> "$GITHUB_OUTPUT"
          echo "Using: $latest"

      - name: Build the ODSL league page
        run: python tools/scripts/build_gadget.py --csv "${{ steps.pick.outputs.csv }}" --skin odsl --out odsl/index.html --standards-label 2026 --official

      - name: Publish it at the site root too
        run: cp odsl/index.html index.html

      - name: Commit & push
        run: |
          git config user.name  "odsl-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html odsl/index.html
          git diff --cached --quiet || git commit -m "Rebuild ODSL Top Times from $(basename '${{ steps.pick.outputs.csv }}')"
          git push
