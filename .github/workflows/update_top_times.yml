# ODSL Top Times — rebuild BOTH pages when you upload a new CSV
#
# Goes at: .github/workflows/update_top_times.yml  (replace the old contents)
#
# Each CSV upload rebuilds:
#   index.html        -> Willowsford North Waves page (compact header)
#   odsl/index.html   -> Old Dominion Swim League page (full header)
#
# Needs the latest build tooling in the repo under tools/ (from tools.zip) and
# Settings > Actions > General > Workflow permissions = "Read and write".
#
# When the 2026 All-Star standards are published: edit tools/references/cut_standards.csv,
# then add to BOTH build steps below:  --standards-label 2026 --official

name: Build ODSL Top Times

on:
  workflow_dispatch:
  push:
    paths:
      - 'odsl_top_times_*.csv'
      - '**/odsl_top_times_*.csv'

permissions:
  contents: write

concurrency:
  group: build-top-times
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (for logo processing)
        run: pip install --quiet pillow numpy

      - name: Find the newest uploaded CSV
        id: pick
        run: |
          latest=$(
            for f in odsl_top_times_*.csv data/odsl_top_times_*.csv; do
              [ -e "$f" ] && printf '%s|%s\n' "$(basename "$f")" "$f"
            done | sort | tail -n1 | cut -d'|' -f2
          )
          if [ -z "$latest" ]; then
            echo "No odsl_top_times_*.csv found in the repo root or data/ folder."; exit 1
          fi
          echo "csv=$latest" >> "$GITHUB_OUTPUT"
          echo "Using: $latest"

      - name: Build Willowsford North Waves page (root)
        run: python tools/scripts/build_gadget.py --csv "${{ steps.pick.outputs.csv }}" --out index.html --header compact

      - name: Build Old Dominion Swim League page (odsl/)
        run: python tools/scripts/build_gadget.py --csv "${{ steps.pick.outputs.csv }}" --skin odsl --out odsl/index.html

      - name: Commit & push
        run: |
          git config user.name  "odsl-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html odsl/index.html
          git diff --cached --quiet || git commit -m "Rebuild top times (Waves + ODSL) from $(basename '${{ steps.pick.outputs.csv }}')"
          git push
